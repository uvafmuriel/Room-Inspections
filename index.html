<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1a18">
<title>Room Inspection — Lawn & Range</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#ede9e2;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1a18;--text2:#5a5a55;--text3:#9a9a92;
  --accent:#c94f1e;--accent-light:#faeae3;--accent-text:#8c3210;
  --green:#3a7c4a;--green-light:#e6f2e8;--green-text:#265232;
  --amber:#b07820;--amber-light:#fdf3dc;--amber-text:#7a520f;
  --radius:14px;--radius-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:16px;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#1a1a18;color:#f5f3ee;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-logo svg{width:18px;height:18px}
.topbar-title{flex:1}
.topbar-title h1{font-size:15px;font-weight:600;letter-spacing:-.2px}
.topbar-title p{font-size:11px;color:#9a9a8a;margin-top:1px;font-family:'DM Mono',monospace}
.topbar-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#f5f3ee;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 12px;cursor:pointer}
.page{display:none;flex:1}
.page.active{display:block}
.setup-wrap{padding:24px 16px 40px;max-width:480px;margin:0 auto}
.setup-heading{font-size:22px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.field-group{margin-bottom:16px}
.field-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.field-group input,.field-group select{width:100%;padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.field-group input:focus,.field-group select:focus{border-color:var(--accent)}
.cat-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.cat-tab{padding:10px 6px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none}
.cat-tab.active{background:#1a1a18;border-color:#1a1a18;color:#f5f3ee}
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.room-chip{padding:10px 4px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none}
.room-chip.selected{background:#1a1a18;border-color:#1a1a18;color:#f5f3ee}
.start-btn{width:100%;margin-top:28px;padding:16px;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s}
.start-btn:active{background:var(--accent-text)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:90}
.stat-cell{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-num{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);line-height:1}
.stat-num.warn{color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.sections-wrap{padding:12px 12px 100px}
.section-card{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.section-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.section-icon{width:36px;height:36px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.section-info{flex:1;min-width:0}
.section-name{font-size:15px;font-weight:600}
.section-status{font-size:12px;color:var(--text3);margin-top:1px}
.section-status.has-issues{color:var(--accent);font-weight:500}
.section-status.ok{color:var(--green);font-weight:500}
.section-chevron{font-size:20px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.section-card.open .section-chevron{transform:rotate(180deg)}
.section-body{display:none;border-top:1px solid var(--border)}
.section-card.open .section-body{display:block}
.item-row{padding:13px 14px;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-top{display:flex;align-items:center;gap:8px}
.item-name{flex:1;font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.item-checks{display:flex;gap:6px;flex-shrink:0}
.check-pill{display:flex;align-items:center;padding:6px 10px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-appearance:none;touch-action:manipulation}
.check-pill.missing.active{background:var(--amber-light);border-color:var(--amber);color:var(--amber-text)}
.check-pill.broken.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.yn-pill{display:flex;align-items:center;padding:6px 10px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-appearance:none;touch-action:manipulation}
.yn-pill.yes.active{background:var(--green-light);border-color:var(--green);color:var(--green-text)}
.yn-pill.no.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.floor-pill{display:flex;align-items:center;padding:6px 10px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-appearance:none;touch-action:manipulation}
.floor-pill.sat.active{background:var(--green-light);border-color:var(--green);color:var(--green-text)}
.floor-pill.repair.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.item-note{margin-top:8px;width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;display:none;resize:none;min-height:38px}
.item-note.visible{display:block}
.item-note:focus{border-color:var(--accent)}
/* Note toggle shows pencil + Edit text */
.note-toggle{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:7px;background:transparent;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;color:var(--text3);font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .12s;-webkit-appearance:none}
.note-toggle.active{background:var(--surface2);border-color:var(--border2);color:var(--text2)}
.item-wo-row{display:flex;align-items:center;padding:8px 0 2px;gap:8px}.item-wo-label{flex:1;font-size:12px;color:var(--text2)}.item-wo-btns{display:flex;gap:5px}.item-wo-btn{padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;-webkit-appearance:none;touch-action:manipulation}.item-wo-btn.yes.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}.item-wo-btn.no.active{background:var(--green-light);border-color:var(--green);color:var(--green-text)}
.add-item-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.add-item-input{flex:1;padding:8px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none}
.add-item-input:focus{border-color:var(--accent)}
.add-item-btn{padding:8px 14px;background:#1a1a18;color:#f5f3ee;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.wo-row{display:flex;align-items:center;padding:12px 14px;background:var(--bg);gap:10px;border-top:1px solid var(--border)}
.wo-label{flex:1;font-size:13px;font-weight:500;color:var(--text2)}
.wo-btns{display:flex;gap:6px}
.wo-btn{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;-webkit-appearance:none;touch-action:manipulation}
.wo-btn.yes.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.wo-btn.no.active{background:var(--green-light);border-color:var(--green);color:var(--green-text)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a18;padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));display:none;gap:10px;z-index:100}
.bottom-bar.visible{display:flex}
.bottom-btn{flex:1;padding:14px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;touch-action:manipulation}
.bottom-btn.outline{background:rgba(255,255,255,.12);color:#f5f3ee}
.bottom-btn.primary{background:var(--accent);color:white}
/* Warning banner */
.warn-banner{background:var(--amber-light);border:1px solid var(--amber);border-radius:var(--radius-sm);padding:12px 14px;margin:0 12px 12px;font-size:13px;color:var(--amber-text);font-weight:500;display:none}
.warn-banner.visible{display:block}
.summary-wrap{padding:16px 12px 100px;max-width:480px;margin:0 auto}
.summary-room-header{margin-bottom:16px;padding:14px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)}
.summary-room-name{font-size:18px;font-weight:600}
.summary-room-meta{font-size:13px;color:var(--text2);margin-top:3px}
.summary-section{margin-bottom:10px}
.summary-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:0 4px;margin-bottom:6px}
.summary-item{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px}
.summary-item-name{font-size:14px;font-weight:500}
.summary-item-note{font-size:12px;color:var(--text2);margin-top:3px}
.summary-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px}
.tag.no{background:var(--accent-light);color:var(--accent-text)}
.tag.yes{background:var(--green-light);color:var(--green-text)}
.tag.wo{background:#ede9e2;color:#5a5a55}
.complete-banner{background:var(--green-light);border:1px solid var(--green);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:14px;color:var(--green-text);font-weight:500}
/* Export section: big primary send button, small secondary CSV */
.export-section{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.send-btn{width:100%;padding:18px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:17px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;touch-action:manipulation;-webkit-appearance:none;letter-spacing:-.2px}
.send-btn:active{background:var(--accent-text)}
.csv-btn{align-self:center;padding:8px 16px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);touch-action:manipulation;-webkit-appearance:none}
.new-room-btn{width:100%;padding:14px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:2px solid #1a1a18;background:transparent;color:#1a1a18;touch-action:manipulation;-webkit-appearance:none;margin-top:4px}
</style>
</head>
<body>
<div id="app">

<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="9" width="14" height="7" rx="1.5" fill="white" opacity=".9"/><path d="M1 9.5L9 3l8 6.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="topbar-title">
    <h1>Room Inspection</h1>
    <p id="topbar-sub">Lawn &amp; Range</p>
  </div>
  <button class="topbar-btn" id="menu-btn" onclick="showSummary()" style="display:none">Summary</button>
</div>

<!-- SETUP -->
<div class="page active" id="page-setup">
  <div class="setup-wrap">
    <h2 class="setup-heading">Start inspection</h2>
    <p class="setup-sub">Fill in the details, select a room, then begin.</p>
    <div class="field-group">
      <label>Your name</label>
      <input type="text" id="inspector-name" placeholder="e.g. John Smith" autocomplete="name" />
    </div>
    <div class="field-group">
      <label>Date</label>
      <input type="date" id="insp-date" />
    </div>
    <div class="field-group">
      <label>Select room</label>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="rooms-grid" id="rooms-grid"></div>
      <input type="text" id="custom-room" placeholder="Or type a custom room…" style="margin-top:8px" />
    </div>
    <div class="field-group">
      <label>Trade / department</label>
      <select id="trade-select">
        <option value="">All trades</option>
        <option value="Carpentry">Carpentry</option>
        <option value="Electrical">Electrical</option>
        <option value="Plumbing">Plumbing</option>
        <option value="HVAC">HVAC</option>
      </select>
    </div>
    <button class="start-btn" onclick="startInspection()">Begin inspection →</button>
  </div>
</div>

<!-- INSPECT -->
<div class="page" id="page-inspect">
  <div class="stats-bar">
    <div class="stat-cell"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Items</div></div>
    <div class="stat-cell"><div class="stat-num warn" id="s-issues">0</div><div class="stat-lbl">Issues</div></div>
    <div class="stat-cell"><div class="stat-num warn" id="s-no">0</div><div class="stat-lbl">Failed</div></div>
    <div class="stat-cell"><div class="stat-num warn" id="s-wo">0</div><div class="stat-lbl">WOs</div></div>
  </div>
  <div class="warn-banner" id="warn-banner"></div>
  <div class="sections-wrap" id="sections-wrap"></div>
  <div class="bottom-bar visible">
    <button class="bottom-btn outline" onclick="showPage('page-setup')">← Back</button>
    <button class="bottom-btn primary" onclick="reviewAndExport()">Review &amp; export →</button>
  </div>
</div>

<!-- SUMMARY -->
<div class="page" id="page-summary">
  <div class="summary-wrap" id="summary-wrap"></div>
  <div class="bottom-bar visible">
    <button class="bottom-btn outline" onclick="showPage('page-inspect')">← Edit</button>
  </div>
</div>

</div>
<script>
const ALL_SECTIONS = [
  { id:'furniture', icon:'🪑', label:'Furniture', trades:['','Carpentry'], items:[
    {n:'Bed present and in good condition',t:'functional'},{n:'Bed ladder present and in good condition',t:'functional'},
    {n:'Rocking chair present and in good condition',t:'functional'},{n:'Straight-backed chair present and in good condition',t:'functional'},
    {n:'Desk present and in good condition',t:'functional'},{n:'Bookshelf present and in good condition',t:'functional'},
    {n:'Mirror present and in good condition',t:'functional'}
  ]},
  { id:'plaster', icon:'🏠', label:'Plaster and paint', trades:['','Carpentry'], items:[
    {n:'Walls free of tenant damage',t:'functional'},{n:'Walls free of water damage',t:'functional'},
    {n:'Plaster in good condition',t:'functional'},{n:'Interior paint in good condition',t:'functional'},
    {n:'Exterior paint in good condition',t:'functional'},{n:'Windowsill and mantle paint in good condition',t:'functional'},
    {n:'Condition of Floor',t:'functional'},{n:'Command strips removed',t:'functional'}
  ]},
  { id:'electrical', icon:'⚡', label:'Electrical', trades:['','Electrical'], items:[
    {n:'Refrigerator functioning and on correct receptacle',t:'functional'},
    {n:'Microwave functioning and on correct receptacle',t:'functional'},
    {n:'Lights over sink enclosure functioning',t:'functional'},{n:'Lights inside sink enclosure functioning',t:'functional'},
    {n:'Fan functioning properly',t:'functional'},{n:'General receptacle functioning properly',t:'functional'},{n:'CO detector functioning properly',t:'functional'}
  ]},
  { id:'plumbing', icon:'💧', label:'Plumbing', trades:['','Plumbing'], items:[
    {n:'Plumbing leak-free',t:'functional'},{n:'Cold water functional',t:'functional'},{n:'Hot water functional',t:'functional'},
    {n:'Sink drain functioning properly',t:'functional'},{n:'Stops functioning properly',t:'functional'},{n:'AAV functioning properly',t:'functional'}
  ]},
  { id:'doors', icon:'🚪', label:'Doors', trades:['','Carpentry'], items:[
    {n:'Exterior door operational',t:'functional'},{n:'Exterior door hinges OK',t:'functional'},{n:'Exterior door hardware OK',t:'functional'},
    {n:'Sink enclosure door operational',t:'functional'},{n:'Sink enclosure door hinges OK',t:'functional'},{n:'Sink enclosure door hardware OK',t:'functional'},
    {n:'Closet door operational',t:'functional'},{n:'Closet door hinges OK',t:'functional'},{n:'Closet door hardware OK',t:'functional'}
  ]},
  { id:'windows', icon:'🪟', label:'Windows', trades:['','Carpentry'], items:[
    {n:'Hardware OK',t:'functional'},{n:'Glass intact',t:'functional'},
    {n:'Wood frame and mullions in good condition',t:'functional'},
    {n:'Blinds operational',t:'functional'},{n:'Sash cords OK',t:'functional'}
  ]},
  { id:'fireplace', icon:'🔥', label:'Fireplace', trades:['','Carpentry'], items:[
    {n:'Ash can present',t:'functional'},{n:'Brush present',t:'functional'},{n:'Tongs present',t:'functional'},
    {n:'Poker present',t:'functional'},{n:'Screen present',t:'functional'},{n:'Log rack present',t:'functional'},
    {n:'Holder present',t:'functional'},{n:'Fireplace shovel present',t:'functional'}
  ]},
  { id:'firesafety', icon:'🧯', label:'Fire safety', trades:['','Electrical'], items:[
    {n:'Fire extinguisher functioning properly',t:'functional'},{n:'Extinguisher inspection tag current',t:'functional'},
    {n:'CO detector functioning properly',t:'functional'},{n:'Smoke alarm functioning properly',t:'functional'}
  ]},
  { id:'hvac', icon:'🌡️', label:'HVAC', trades:['','HVAC'], items:[
    {n:'Heating operational',t:'functional'},{n:'Cooling operational',t:'functional'},
    {n:'Filter in good condition',t:'functional'},{n:'Vents unobstructed',t:'functional'},
    {n:'Unit cover present',t:'functional'},{n:'Units 2 hoses present',t:'functional'},{n:'Remote present',t:'functional'}
  ]},
];

function oddRange(max){ const r=[]; for(let i=1;i<=max;i+=2) r.push(String(i)); return r; }
function evenRange(max){ const r=[]; for(let i=2;i<=max;i+=2) r.push(String(i)); return r; }

const ROOM_CATEGORIES = [
  { label:'West Lawn',  rooms: oddRange(55) },
  { label:'West Range', rooms: oddRange(53) },
  { label:'East Lawn',  rooms: evenRange(52) },
  { label:'East Range', rooms: [...evenRange(54), 'Cracker Box 1', 'Cracker Box 2'] },
];

let state={}, meta={}, selectedRoom='', activeCat=0;

document.getElementById('insp-date').value = new Date().toISOString().slice(0,10);

const catTabsEl = document.getElementById('cat-tabs');
ROOM_CATEGORIES.forEach((cat,i) => {
  const btn = document.createElement('button');
  btn.className = 'cat-tab' + (i===0?' active':'');
  btn.textContent = cat.label;
  btn.onclick = () => {
    activeCat = i;
    document.querySelectorAll('.cat-tab').forEach((t,j) => t.classList.toggle('active',j===i));
    buildRoomChips(i);
    selectedRoom = '';
  };
  catTabsEl.appendChild(btn);
});

function buildRoomChips(ci) {
  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = '';
  ROOM_CATEGORIES[ci].rooms.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'room-chip';
    btn.textContent = r;
    btn.onclick = () => {
      document.querySelectorAll('.room-chip').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      selectedRoom = r;
      document.getElementById('custom-room').value = '';
    };
    grid.appendChild(btn);
  });
}
buildRoomChips(0);

document.getElementById('custom-room').addEventListener('input', function(){
  if(this.value){
    document.querySelectorAll('.room-chip').forEach(c => c.classList.remove('selected'));
    selectedRoom = this.value;
  }
});

function initState(sections){
  state = {};
  sections.forEach(s => {
    state[s.id] = { wo:null, items:{} };
    s.items.forEach(it => { state[s.id].items[it.n] = { type:it.t, missing:false, broken:false, yn:'yes', floor:null, note:'' }; });
  });
}

function getFilteredSections(){
  const trade = meta.trade || '';
  if(!trade) return ALL_SECTIONS;
  return ALL_SECTIONS.filter(s => s.trades.includes(trade));
}

function startInspection(){
  const name = document.getElementById('inspector-name').value.trim();
  const room = selectedRoom || document.getElementById('custom-room').value.trim();
  const date = document.getElementById('insp-date').value;
  const trade = document.getElementById('trade-select').value;
  if(!name){ alert('Please enter your name.'); return; }
  if(!room){ alert('Please select or enter a room.'); return; }
  meta = { inspector:name, room, date, trade, area:ROOM_CATEGORIES[activeCat].label };
  const sections = getFilteredSections();
  initState(sections);
  buildInspectPage(sections);
  document.getElementById('topbar-sub').textContent = room;
  document.getElementById('menu-btn').style.display = 'flex';
  document.getElementById('warn-banner').classList.remove('visible');
  showPage('page-inspect');
}

function safeId(str){ return str.replace(/[^a-zA-Z0-9]/g,'_'); }

function buildInspectPage(sections){
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';
  sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'card-'+sec.id;
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <div class="section-icon">${sec.icon}</div>
      <div class="section-info">
        <div class="section-name">${sec.label}</div>
        <div class="section-status" id="status-${sec.id}">${sec.items.length} items</div>
      </div>
      <span class="section-chevron">⌄</span>`;
    header.onclick = () => card.classList.toggle('open');
    const body = document.createElement('div');
    body.className = 'section-body';
    body.id = 'body-'+sec.id;
    sec.items.forEach(it => addItemRow(body, sec.id, it.n, it.t));
    const addRow = document.createElement('div');
    addRow.className = 'add-item-row';
    addRow.innerHTML = `
      <input class="add-item-input" id="addinput-${sec.id}" type="text" placeholder="Add a task or item…" />
      <button class="add-item-btn" onclick="addCustomItem('${sec.id}')">+ Add</button>`;
    body.appendChild(addRow);

    // Section WO row
    const wo = document.createElement('div');
    wo.className = 'wo-row';
    wo.innerHTML = `
      <span class="wo-label">WO Needed?</span>
      <div class="wo-btns">
        <button class="wo-btn yes" id="wo-y-${sec.id}" onclick="setWO('${sec.id}','yes')">Yes</button>
        <button class="wo-btn no" id="wo-n-${sec.id}" onclick="setWO('${sec.id}','no')">No</button>
      </div>`;
    body.appendChild(wo);

    card.appendChild(header);
    card.appendChild(body);
    wrap.appendChild(card);
  });
  refreshStats();
  // Apply default active states after all rows are in DOM
  Object.entries(state).forEach(([secId, sec]) => {
    Object.entries(sec.items).forEach(([itemName, s]) => {
      const sid = safeId(secId+'___'+itemName);
      if(s.yn==='yes') document.getElementById('yn-y-'+sid)?.classList.add('active');
      if(s.yn==='no') document.getElementById('yn-n-'+sid)?.classList.add('active');

    });
  });
}

function addItemRow(body, secId, itemName, itemType){
  const row = document.createElement('div');
  row.className = 'item-row';
  const sid = safeId(secId+'___'+itemName);
  let buttonsHTML = '';
  if(itemType === 'condition'){
    buttonsHTML = `
      <button class="check-pill missing" id="miss-${sid}" onclick="toggleCondition('${secId}','${itemName}','missing')">Missing</button>
      <button class="check-pill broken" id="brok-${sid}" onclick="toggleCondition('${secId}','${itemName}','broken')">Broken</button>`;
  } else if(itemType === 'floor'){
    buttonsHTML = `
      <button class="floor-pill sat" id="fl-s-${sid}" onclick="setFloor('${secId}','${itemName}','sat')">Satisfactory</button>
      <button class="floor-pill repair" id="fl-r-${sid}" onclick="setFloor('${secId}','${itemName}','repair')">Needs Repair</button>`;
  } else {
    buttonsHTML = `
      <button class="yn-pill yes" id="yn-y-${sid}" onclick="setYN('${secId}','${itemName}','yes')">Yes</button>
      <button class="yn-pill no" id="yn-n-${sid}" onclick="setYN('${secId}','${itemName}','no')">No</button>`;
  }
  row.innerHTML = `
    <div class="item-top">
      <span class="item-name">${itemName}</span>
      <div class="item-checks">${buttonsHTML}</div>
      <button class="note-toggle" id="notetog-${sid}" onclick="toggleNote('${sid}')">✏ Notes</button>
    </div>
    <textarea class="item-note" id="note-${sid}" placeholder="Add a note…" rows="1"
      oninput="saveNote('${secId}','${itemName}',this.value)"></textarea>`;
  const addRow = document.getElementById('addinput-'+secId)?.parentElement;
  if(addRow) body.insertBefore(row, addRow);
  else body.appendChild(row);


}

function addCustomItem(secId){
  const input = document.getElementById('addinput-'+secId);
  const val = input.value.trim();
  if(!val) return;
  state[secId].items[val] = { type:'functional', missing:false, broken:false, yn:'yes', floor:null, note:'' };
  const body = document.getElementById('body-'+secId);
  addItemRow(body, secId, val, 'functional');
  updateSectionStatus(secId);
  refreshStats();
  input.value = '';
  input.focus();
}

function toggleCondition(secId, item, type){
  const s = state[secId].items[item];
  s[type] = !s[type];
  const sid = safeId(secId+'___'+item);
  document.getElementById((type==='missing'?'miss-':'brok-')+sid)?.classList.toggle('active', s[type]);
  refreshStats();
  updateSectionStatus(secId);
}

function setYN(secId, item, val){
  const s = state[secId].items[item];
  s.yn = s.yn === val ? null : val;
  const sid = safeId(secId+'___'+item);
  const y = document.getElementById('yn-y-'+sid);
  const n = document.getElementById('yn-n-'+sid);
  if(y) y.className = 'yn-pill yes' + (s.yn==='yes'?' active':'');
  if(n) n.className = 'yn-pill no' + (s.yn==='no'?' active':'');
  refreshStats();
  updateSectionStatus(secId);
}

function setFloor(secId, item, val){
  const s = state[secId].items[item];
  s.floor = s.floor === val ? null : val;
  const sid = safeId(secId+'___'+item);
  const sat = document.getElementById('fl-s-'+sid);
  const rep = document.getElementById('fl-r-'+sid);
  if(sat) sat.className = 'floor-pill sat' + (s.floor==='sat'?' active':'');
  if(rep) rep.className = 'floor-pill repair' + (s.floor==='repair'?' active':'');
  refreshStats();
  updateSectionStatus(secId);
}

function toggleNote(sid){
  const note = document.getElementById('note-'+sid);
  const tog = document.getElementById('notetog-'+sid);
  const vis = note.classList.toggle('visible');
  tog.classList.toggle('active', vis);
  if(vis) note.focus();
}

function saveNote(secId, item, val){
  if(state[secId]?.items[item]) state[secId].items[item].note = val;
}

function setWO(secId, val){
  state[secId].wo = val;
  document.getElementById('wo-y-'+secId).className = 'wo-btn yes'+(val==='yes'?' active':'');
  document.getElementById('wo-n-'+secId).className = 'wo-btn no'+(val==='no'?' active':'');
  refreshStats();
}

function hasIssue(it){
  return it.yn === 'no';
}

function countUnanswered(){
  return 0;
}

function refreshStats(){
  let total=0, issues=0, nos=0, wo=0;
  Object.entries(state).forEach(([sid, sec]) => {
    Object.values(sec.items).forEach(it => {
      total++;
      if(it.type==='condition' && (it.missing||it.broken)){ issues++; }
      if(it.type==='functional' && it.yn==='no'){ issues++; nos++; }
    });
    Object.values(sec.items).forEach(it => { if(it.wo==='yes') wo++; });
  });
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-issues').textContent = issues;
  document.getElementById('s-no').textContent = nos;
  document.getElementById('s-wo').textContent = wo;
}

function updateSectionStatus(secId){
  let issues=0, total=0;
  Object.values(state[secId].items).forEach(it => { total++; if(hasIssue(it)) issues++; });
  const el = document.getElementById('status-'+secId);
  if(!el) return;
  if(issues===0){ el.textContent = total+' items'; el.className='section-status'; }
  else { el.textContent = issues+' issue'+(issues>1?'s':''); el.className='section-status has-issues'; }
}

function reviewAndExport(){
  const unanswered = countUnanswered();
  const banner = document.getElementById('warn-banner');
  if(unanswered > 0){
    banner.textContent = '⚠️ ' + unanswered + ' item' + (unanswered>1?'s are':' is') + ' unanswered. Proceeding in 2 seconds…';
    banner.classList.add('visible');
    window.scrollTo(0,58);
    setTimeout(() => { buildSummary(); showPage('page-summary'); }, 2000);
  } else {
    banner.classList.remove('visible');
    buildSummary();
    showPage('page-summary');
  }
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showSummary(){ buildSummary(); showPage('page-summary'); }

function getTimestamp(){
  const now = new Date();
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${m} ${ampm}`;
}

function buildSummary(){
  const wrap = document.getElementById('summary-wrap');
  wrap.innerHTML = '';
  const sections = getFilteredSections();
  let allIssues = [];
  sections.forEach(sec => {
    const secState = state[sec.id];
    if(!secState) return;
    Object.entries(secState.items).forEach(([item, val]) => {
      if(hasIssue(val) || val.note) allIssues.push({ section:sec.label, item, ...val, wo:secState.wo });
    });
  });

  const unanswered = countUnanswered();

  wrap.innerHTML = `
    <div class="summary-room-header">
      <div class="summary-room-name">${meta.room}</div>
      <div class="summary-room-meta">${meta.inspector} · ${meta.date} · ${getTimestamp()}${meta.trade?' · '+meta.trade:''}</div>
    </div>`;

  if(unanswered > 0){
    wrap.innerHTML += `<div class="complete-banner" style="background:var(--amber-light);border-color:var(--amber);color:var(--amber-text)">⚠️ ${unanswered} unanswered item${unanswered>1?'s':''}</div>`;
  }

  if(allIssues.length===0){
    wrap.innerHTML += `<div class="complete-banner">✅ No issues recorded — room looks good!</div>`;
  } else {
    wrap.innerHTML += `<div class="complete-banner" style="background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)">⚠️ ${allIssues.length} issue${allIssues.length>1?'s':''} recorded</div>`;
    const bySection = {};
    allIssues.forEach(i => {
      if(!bySection[i.section]) bySection[i.section]='';
      let tags = '';
      if(i.type==='condition'){
        if(i.missing) tags += '<span class="tag missing">Missing</span>';
        if(i.broken) tags += '<span class="tag broken">Broken</span>';
      } else if(i.type==='floor'){
        if(i.floor==='sat') tags += '<span class="tag yes">Satisfactory</span>';
        if(i.floor==='repair') tags += '<span class="tag broken">Needs Repair</span>';
      } else {
        if(i.yn==='no') tags += '<span class="tag no">No</span>';
        if(i.yn==='yes') tags += '<span class="tag yes">Yes</span>';
      }
      if(i.wo==='yes') tags += '<span class="tag wo">WO needed</span>';
      bySection[i.section] += `<div class="summary-item">
        <div class="summary-item-name">${i.item}</div>
        <div class="summary-tags">${tags}</div>
        ${i.note?`<div class="summary-item-note">${i.note}</div>`:''}
      </div>`;
    });
    Object.entries(bySection).forEach(([secName, html]) => {
      const div = document.createElement('div');
      div.className = 'summary-section';
      div.innerHTML = `<div class="summary-section-title">${secName}</div>${html}`;
      wrap.appendChild(div);
    });
  }

  const exp = document.createElement('div');
  exp.className = 'export-section';
  exp.innerHTML = `
    <button class="send-btn" onclick="emailSummary()">Complete &amp; Send</button>
    <button class="csv-btn" onclick="exportCSV()">Export CSV</button>`;
  wrap.appendChild(exp);
}

function startNewRoom(){
  state = {}; meta = {}; selectedRoom = '';
  document.getElementById('inspector-name').value = '';
  document.getElementById('custom-room').value = '';
  document.querySelectorAll('.room-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('menu-btn').style.display = 'none';
  document.getElementById('topbar-sub').textContent = 'Lawn & Range';
  showPage('page-setup');
}

function exportCSV(){
  const sections = getFilteredSections();
  let csv = 'Inspector,Room,Date,Time,Trade,Section,Item,Type,Status,Notes,WO Required\n';
  const time = getTimestamp();
  sections.forEach(sec => {
    const secState = state[sec.id];
    if(!secState) return;
    Object.entries(secState.items).forEach(([item, val]) => {
      let status = '';
      if(val.type==='condition'){
        const flags = [];
        if(val.missing) flags.push('Missing');
        if(val.broken) flags.push('Broken');
        status = flags.join('/') || 'OK';
      } else if(val.type==='floor'){
        status = val.floor==='sat'?'Satisfactory':val.floor==='repair'?'Needs Repair':'Not answered';
      } else {
        status = val.yn ? val.yn.charAt(0).toUpperCase()+val.yn.slice(1) : 'Not answered';
      }
      csv += [meta.inspector, meta.room, meta.date, time, meta.trade||'All trades',
        sec.label, item, val.type==='condition'?'Condition':'Functional',
        status, '"'+(val.note||'').replace(/"/g,'""')+'"', secState.wo||'—'].join(',') + '\n';
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `inspection_${meta.room}_${meta.date}.csv`.replace(/\s/g,'_');
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function emailSummary(){
  const sections = getFilteredSections();
  const time = getTimestamp();
  let body = `Room Inspection — ${meta.room}\nInspector: ${meta.inspector} | Date: ${meta.date} | Time: ${time} | Area: ${meta.area}`;
  if(meta.trade) body += ` | Trade: ${meta.trade}`;
  body += '\n\n';
  let foundIssues = false;
  sections.forEach(sec => {
    const secState = state[sec.id];
    if(!secState) return;
    let lines = [];
    Object.entries(secState.items).forEach(([item, val]) => {
      if(hasIssue(val) || val.note){
        foundIssues = true;
        let flag = '';
        if(val.type==='condition'){
          if(val.missing) flag += '[MISSING] ';
          if(val.broken) flag += '[BROKEN] ';
        } else if(val.type==='floor'){
          if(val.floor==='sat') flag = '[SATISFACTORY] ';
          if(val.floor==='repair') flag = '[NEEDS REPAIR] ';
        } else {
          if(val.yn==='no') flag = '[NO] ';
          if(val.yn==='yes') flag = '[YES] ';
        }
        const wo = secState.wo === 'yes' ? '| WO: YES' : '| WO: NO';
        const secLabel = sec.label;
        const tradeLabel = meta.trade || 'All trades';
        lines.push(`  - ${item}: ${flag.trim()} | TRADE: ${tradeLabel} — ${secLabel} | ${wo}${val.note?' | NOTE: '+val.note:''}`);
      }
    });
    if(lines.length) body += `${sec.label}${secState.wo==='yes'?' (WO REQUIRED)':''}:\n${lines.join('\n')}\n\n`;
  });
  const unanswered = countUnanswered();
  if(unanswered > 0) body += `Note: ${unanswered} item${unanswered>1?'s were':' was'} not answered.\n\n`;
  if(!foundIssues) body += 'No issues recorded — room looks good!\n';
  const subject = `Room Inspection — ${meta.room} — ${meta.date} ${time}`;
  window.location.href = `mailto:gre4se@virginia.edu?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  // Show "Start new room" after sending
  setTimeout(() => {
    const existing = document.getElementById('new-room-reveal');
    if(!existing){
      const btn = document.createElement('button');
      btn.id = 'new-room-reveal';
      btn.className = 'new-room-btn';
      btn.textContent = '+ Start new room';
      btn.onclick = startNewRoom;
      btn.style.marginTop = '10px';
      const expSection = document.querySelector('.export-section');
      if(expSection) expSection.appendChild(btn);
    }
  }, 1000);
}
</script>
